dataset_config: configs/dataset.yaml

model_config: configs/model.yaml

training:
  epochs: 100
  batch_size: 8
  image_size: 640
  num_workers: 2
  seed: 42
  amp: true
  grad_clip_norm: 1.0

  max_prompts: 8
  prompt_strategy: random
  include_description: true
  include_definition: true

optimizer:
  type: adamw
  lr: 0.0001
  weight_decay: 0.0001

scheduler:
  type: cosine

output:
  save_dir: runs
