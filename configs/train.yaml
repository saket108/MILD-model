dataset_config: configs/dataset.yaml

model_config: configs/model.yaml

training:
  epochs: 100
  batch_size: 8
  image_size: 640
  num_workers: 2
  seed: 42
  amp: true
  grad_clip_norm: 1.0
  class_balance:
    sampling:
      enabled: true
      power: 0.5
      mode: max
      max_weight: 4.0
    loss:
      enabled: true
      power: 0.5
      max_weight: 3.0

  max_prompts: 8
  prompt_strategy: coverage
  prompt_mode: full
  include_description: true
  include_definition: true

  val_max_prompts: 8
  val_prompt_strategy: coverage
  val_prompt_mode: full
  val_include_description: true
  val_include_definition: true

optimizer:
  type: adamw
  lr: 0.0001
  weight_decay: 0.0001

scheduler:
  type: cosine

evaluation:
  best_metric_key: map50
  score_threshold: 0.05
  nms_iou: 0.5

output:
  save_dir: runs
