image_encoder: convnext_tiny
text_encoder: sentence-transformers/all-MiniLM-L6-v2

hidden_dim: 256
num_queries: 100

fusion:
  type: prompt_guided_attention
  num_heads: 8
  dropout: 0.1

metrics_dim: 4
metrics_hidden: 128

decoder_layers: 3
decoder_heads: 8

num_classes: 5

multiscale: true
feature_indices: [1, 2, 3]
use_positional_encoding: true
return_intermediate: true

text_encoder_trainable: false
text_encoder_cache: true
text_encoder_cache_max_size: 4096

loss_weights:
  loss_bbox: 5.0
  loss_giou: 2.0
  loss_cls: 1.0
  loss_severity: 1.0
  loss_aux: 0.5
