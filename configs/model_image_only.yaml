image_encoder: swinv2_large_window12to24_192to384
text_encoder: Alibaba-NLP/gte-large-en-v1.5

hidden_dim: 256
num_queries: 20

fusion:
  type: prompt_guided_attention
  num_heads: 8
  dropout: 0.1

metrics_dim: 4
metrics_hidden: 128

decoder_layers: 2
decoder_heads: 8

num_classes: 6

multiscale: true
feature_indices: [1, 2, 3]
use_positional_encoding: true
return_intermediate: false

text_encoder_trainable: false
text_encoder_cache: true
text_encoder_cache_max_size: 4096
text_pooling: cls
text_encoder_trust_remote_code: true
use_text: false
use_metrics: false

loss_weights:
  loss_bbox: 5.0
  loss_giou: 2.0
  loss_cls: 1.0
  loss_severity: 1.0
  loss_aux: 0.0
